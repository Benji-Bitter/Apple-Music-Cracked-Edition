name: Build macOS App

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Create missing icon
        run: |
          if [ ! -f "icon.png" ]; then
            echo "Creating placeholder icon.png"
            convert -size 512x512 xc:transparent icon.png
          fi

      - name: Remove bundled Sparkle duplicate
        run: |
          rm -rf "Sparkle-for-Swift-Package-Manager"

      - name: Resolve Swift packages
        run: |
          xcodebuild \
          -resolvePackageDependencies \
          -project "Apple Music Cracked Edition.xcodeproj"

      - name: Clean build
        run: |
          xcodebuild \
          -project "Apple Music Cracked Edition.xcodeproj" \
          -scheme "Apple Music Cracked Edition" \
          clean

      - name: Build app
        run: |
          xcodebuild \
          -project "Apple Music Cracked Edition.xcodeproj" \
          -scheme "Apple Music Cracked Edition" \
          -configuration Release \
          CODE_SIGNING_ALLOWED=NO \
          CODE_SIGNING_REQUIRED=NO \
          CODE_SIGN_IDENTITY="" \
          build

      - name: Locate app
        run: |
          find ~/Library/Developer/Xcode/DerivedData -name "*.app"

      - name: Package app
        run: |
          mkdir -p build
          APP_PATH=$(find ~/Library/Developer/Xcode/DerivedData -name "Apple Music Cracked Edition.app" | head -n 1)
          cp -R "$APP_PATH" build/

      - name: Upload app
        uses: actions/upload-artifact@v4
        with:
          name: Apple-Music-Cracked-Edition-App
          path: build/
