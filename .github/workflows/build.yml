name: Build macOS App

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Remove duplicate Sparkle resources
        run: |
          rm -f "Sparkle-for-Swift-Package-Manager/LICENSE"
          rm -f "Sparkle-for-Swift-Package-Manager/bin/old_dsa_scripts/sign_update"

      - name: Resolve Swift packages
        run: |
          xcodebuild \
          -resolvePackageDependencies \
          -project "Apple Music Cracked Edition.xcodeproj"

      - name: Clean
        run: |
          xcodebuild \
          -project "Apple Music Cracked Edition.xcodeproj" \
          -scheme "Apple Music Cracked Edition" \
          clean

      - name: Build
        run: |
          xcodebuild \
          -project "Apple Music Cracked Edition.xcodeproj" \
          -scheme "Apple Music Cracked Edition" \
          -configuration Release \
          CODE_SIGNING_ALLOWED=NO \
          CODE_SIGNING_REQUIRED=NO \
          CODE_SIGN_IDENTITY="" \
          build

      - name: Find App
        run: |
          find ~/Library/Developer/Xcode/DerivedData -name "*.app"

      - name: Package App
        run: |
          mkdir build
          cp -R "$(find ~/Library/Developer/Xcode/DerivedData -name 'Apple Music Cracked Edition.app' | head -n 1)" build/

      - name: Upload App
        uses: actions/upload-artifact@v4
        with:
          name: Apple-Music-Cracked-Edition-App
          path: build/
