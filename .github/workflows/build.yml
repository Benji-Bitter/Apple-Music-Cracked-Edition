name: Build macOS App

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Create missing icon
        run: |
          if [ ! -f "icon.png" ]; then
            echo "Creating placeholder icon.png"
            python3 <<'PY'
          import struct
          import zlib

          width = 512
          height = 512

          pixel = bytes([32, 133, 255, 255])
          raw = b"".join(
              b"\x00" + pixel * width
              for _ in range(height)
          )

          def chunk(name, data):
              return (
                  struct.pack(">I", len(data))
                  + name
                  + data
                  + struct.pack(">I", zlib.crc32(name + data) & 0xffffffff)
              )

          png = b"\x89PNG\r\n\x1a\n"
          png += chunk(
              b"IHDR",
              struct.pack(">IIBBBBB",
                  width,
                  height,
                  8,
                  6,
                  0,
                  0,
                  0
              )
          )
          png += chunk(b"IDAT", zlib.compress(raw))
          png += chunk(b"IEND", b"")

          with open("icon.png", "wb") as f:
              f.write(png)

          print("Created icon.png")
          PY
          fi

      - name: Remove bundled Sparkle duplicate
        run: |
          rm -rf "Sparkle-for-Swift-Package-Manager"

      - name: Resolve Swift packages
        run: |
          xcodebuild \
          -resolvePackageDependencies \
          -project "Apple Music Cracked Edition.xcodeproj"

      - name: Clean build
        run: |
          xcodebuild \
          -project "Apple Music Cracked Edition.xcodeproj" \
          -scheme "Apple Music Cracked Edition" \
          clean

      - name: Build app
        run: |
          xcodebuild \
          -project "Apple Music Cracked Edition.xcodeproj" \
          -scheme "Apple Music Cracked Edition" \
          -configuration Release \
          CODE_SIGNING_ALLOWED=NO \
          CODE_SIGNING_REQUIRED=NO \
          CODE_SIGN_IDENTITY="" \
          build

      - name: Locate app
        run: |
          find ~/Library/Developer/Xcode/DerivedData -name "*.app"

      - name: Package app
        run: |
          mkdir -p build
          APP_PATH=$(find ~/Library/Developer/Xcode/DerivedData -name "Apple Music Cracked Edition.app" | head -n 1)
          cp -R "$APP_PATH" build/

      - name: Upload app
        uses: actions/upload-artifact@v4
        with:
          name: Apple-Music-Cracked-Edition-App
          path: build/
